name: Require Linked Issue

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  linked-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: ${{ hashFiles('.github/scripts/pr_issue_link_guard.mjs') != '' }}
        with:
          node-version: '20'

      - name: Validate PR links an issue via local guard (if present)
        if: ${{ hashFiles('.github/scripts/pr_issue_link_guard.mjs') != '' }}
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/pr_issue_link_guard.mjs

      - name: Validate PR links an issue (template fallback)
        if: ${{ hashFiles('.github/scripts/pr_issue_link_guard.mjs') == '' }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          TEXT="${PR_TITLE}\n\n${PR_BODY:-}"

          if echo "$TEXT" | grep -Eiq '(close[sd]?|fix(e[sd])?|resolve[sd]?|ref(s)?)\s*#?[0-9]+'; then
            echo "Linked issue keyword found in PR title/body."
            exit 0
          fi

          echo "PR must link an issue using keywords like: Resolves #123 / Fixes #123 / Refs #123" >&2
          exit 1
