name: Notion Reconcile

on:
  schedule:
    - cron: '17 1 * * *'
  workflow_dispatch:

concurrency:
  group: notion-write-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reconcile last 30 days
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          NOTION_PORTFOLIO_DB_ID: ${{ secrets.NOTION_PORTFOLIO_DB_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RECONCILE_DAYS: '30'
        run: node .github/scripts/notion_reconcile_runner.mjs
