name: Notion Sync

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review, review_requested, closed]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_dispatch:

concurrency:
  group: notion-write-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync single event to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TASK_DB_ID: ${{ secrets.NOTION_TASK_DB_ID }}
          NOTION_PORTFOLIO_DB_ID: ${{ secrets.NOTION_PORTFOLIO_DB_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node .github/scripts/notion_sync_runner.mjs
