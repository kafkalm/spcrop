name: Issue Status Sync

on:
  issues:
    types: [closed, reopened]

permissions:
  contents: read
  issues: write

jobs:
  sync-status-label:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize status labels on issue state change
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.setFailed("Issue payload is missing.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const target = issue.state === "closed" ? "status:done" : "status:ready";

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                  return;
                }
                throw error;
              }
            };

            await ensureLabel("status:ready", "bfdadc", "Ready");
            await ensureLabel("status:done", "0e8a16", "Done");

            const currentStatusLabels = (issue.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter((name) => name && name.startsWith("status:"));

            for (const name of currentStatusLabels) {
              if (name === target) continue;
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            if (!currentStatusLabels.includes(target)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [target] });
            }

            core.info(`Issue #${issue_number} status labels normalized -> ${target}`);
